name: Scheduled Automation Jobs

on:
  schedule:
    - cron: '0 */6 * * *'
    - cron: '0 9 * * *'
    - cron: '0 18 * * *'
    - cron: '0 8 * * 1'

jobs:
  score-leads:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install
      - run: node scripts/jobs/scoreLeads.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  send-emails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install
      - run: node scripts/jobs/sendEmailSequences.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

  daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install
      - run: node scripts/jobs/generateDailyReport.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
